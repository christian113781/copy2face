<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Copy2Paste</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="menu">
    <div class="menu-header">
      <img src="icons/icon48.png" alt="" />
      <span>Copy2Paste</span>
    </div>

    <button class="menu-item" id="start-text-btn">
      <span class="icon">
        <svg viewBox="0 0 20 20" width="19" height="19" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 6V3.5A1.5 1.5 0 0 1 3.5 2H6" fill="none" stroke="#4f8cff" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M14 2h2.5A1.5 1.5 0 0 1 18 3.5V6" fill="none" stroke="#4f8cff" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M18 14v2.5a1.5 1.5 0 0 1-1.5 1.5H14" fill="none" stroke="#4f8cff" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M6 18H3.5A1.5 1.5 0 0 1 2 16.5V14" fill="none" stroke="#4f8cff" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="10" cy="10" r="3.2" fill="#ff9f43"/>
        </svg>
      </span>
      <span>Start selection (text)</span>
    </button>

    <button class="menu-item" id="start-image-btn">
      <span class="icon">
        <svg viewBox="0 0 20 20" width="19" height="19" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="3" width="16" height="14" rx="2" fill="#eaf1ff" stroke="#4f8cff" stroke-width="1.3"/>
          <circle cx="6.3" cy="7.3" r="1.6" fill="#ffcc4d"/>
          <path d="M3 15.5l4.5-5 3.5 3.8 2.3-2.6 4.2 4.3" fill="none" stroke="#3bb273" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span>Start selection (image)</span>
    </button>

    <div class="divider"></div>

    <button class="menu-item" id="pick-color-btn">
      <span class="icon">
        <svg viewBox="0 0 20 20" width="19" height="19" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="dropGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#ff6b6b"/>
              <stop offset="0.5" stop-color="#4f8cff"/>
              <stop offset="1" stop-color="#3bb273"/>
            </linearGradient>
          </defs>
          <g transform="rotate(45 10 10)">
            <rect x="8.4" y="1.5" width="3.2" height="8.5" rx="1.4" fill="#5b6270"/>
            <rect x="7.9" y="9.7" width="4.2" height="2.6" rx="0.8" fill="#8a94a6"/>
          </g>
          <path d="M6.5 11.5c1.9 0 3.4 1.5 3.4 3.3 0 1.9-1.5 3.4-3.4 3.4S3.1 16.7 3.1 14.8c0-1.8 1.5-3.3 3.4-3.3z" fill="url(#dropGrad)"/>
        </svg>
      </span>
      <span>Pick a Color (Page)</span>
    </button>

    <div class="divider"></div>

    <button class="menu-item" id="analyze-colors-btn">
      <span class="icon">
        <svg viewBox="0 0 20 20" width="19" height="19" xmlns="http://www.w3.org/2000/svg">
          <circle cx="6.2" cy="6.5" r="2.4" fill="#ff6b6b"/>
          <circle cx="13.8" cy="6.5" r="2.4" fill="#4f8cff"/>
          <circle cx="10" cy="13" r="2.4" fill="#3bb273"/>
        </svg>
      </span>
      <span>Webpage Color Analyzer</span>
    </button>

    <div class="divider"></div>

    <button class="menu-item" id="settings-btn">
      <span class="icon">
        <svg viewBox="0 0 20 20" width="19" height="19" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 6.8a3.2 3.2 0 1 0 0 6.4 3.2 3.2 0 0 0 0-6.4z" fill="none" stroke="#8a94a6" stroke-width="1.5"/>
          <path d="M16.6 10.9c.03-.3.05-.6.05-.9s-.02-.6-.05-.9l1.6-1.25a.55.55 0 0 0 .13-.7l-1.5-2.6a.55.55 0 0 0-.67-.24l-1.9.76a6.5 6.5 0 0 0-1.55-.9l-.29-2.01A.55.55 0 0 0 12 1.7H9a.55.55 0 0 0-.55.47l-.29 2.01c-.56.22-1.08.53-1.55.9l-1.9-.76a.55.55 0 0 0-.67.24l-1.5 2.6a.55.55 0 0 0 .13.7l1.6 1.25c-.03.3-.05.6-.05.9s.02.6.05.9l-1.6 1.25a.55.55 0 0 0-.13.7l1.5 2.6c.14.24.43.34.67.24l1.9-.76c.47.37.99.68 1.55.9l.29 2.01c.04.27.28.47.55.47h3c.27 0 .5-.2.55-.47l.29-2.01c.56-.22 1.08-.53 1.55-.9l1.9.76c.24.1.53 0 .67-.24l1.5-2.6a.55.55 0 0 0-.13-.7l-1.6-1.25z" fill="none" stroke="#ff9f43" stroke-width="1.1" stroke-linejoin="round"/>
        </svg>
      </span>
      <span>Settings</span>
    </button>

    <div class="divider"></div>

    <button class="menu-item" id="help-btn">
      <span class="icon">
        <svg viewBox="0 0 20 20" width="19" height="19" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="helpGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#8b6bff"/>
              <stop offset="1" stop-color="#ff6b9d"/>
            </linearGradient>
          </defs>
          <circle cx="10" cy="10" r="8.5" fill="url(#helpGrad)"/>
          <text x="10" y="14.2" text-anchor="middle" font-size="11" font-family="Arial, sans-serif" font-weight="700" fill="#ffffff">?</text>
        </svg>
      </span>
      <span>Help</span>
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
